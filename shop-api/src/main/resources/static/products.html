<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop — Products</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; }
        nav { background: #4f46e5; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav span { color: white; font-size: 18px; font-weight: bold; }
        nav div a { color: white; text-decoration: none; margin-left: 1.5rem; font-size: 14px; }
        nav div a:hover { text-decoration: underline; }
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; }
        .card { background: white; border-radius: 10px; padding: 1.25rem; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
        .card h3 { font-size: 16px; margin-bottom: 0.4rem; color: #111; }
        .card .category { font-size: 12px; color: #6b7280; margin-bottom: 0.5rem; }
        .card .price { font-size: 20px; font-weight: bold; color: #4f46e5; margin-bottom: 0.25rem; }
        .card .stock { font-size: 12px; color: #9ca3af; margin-bottom: 1rem; }
        .card button { width: 100%; padding: 0.6rem; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .card button:hover { background: #4338ca; }
        .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #111; color: white; padding: 0.75rem 1.25rem; border-radius: 8px; font-size: 14px; display: none; }
    </style>
</head>
<body>
<nav>
    <span>Shop</span>
    <div>
        <a href="/products.html">Products</a>
        <a href="/cart.html">Cart</a>
        <a href="/orders.html">Orders</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="container">
    <div id="grid" class="grid"></div>
</div>

<div id="toast" class="toast"></div>

<script>
    const token = localStorage.getItem('token');
    if (!token) location.href = '/index.html';

    async function load() {
        const res = await fetch('/api/products', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.status === 403 || res.status === 401) { location.href = '/index.html'; return; }
        const data = await res.json();
        const grid = document.getElementById('grid');
        grid.innerHTML = data.content.map(p => `
            <div class="card">
                <div class="category">${p.categoryName}</div>
                <h3>${p.name}</h3>
                <div class="price">$${p.price}</div>
                <div class="stock">In stock: ${p.stock}</div>
                <button onclick="addToCart(${p.id})">Add to cart</button>
            </div>
        `).join('');
    }

    async function addToCart(productId) {
        const res = await fetch('/api/cart/items', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ productId, quantity: 1 })
        });
        showToast(res.ok ? 'Added to cart!' : 'Error');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function logout() {
        localStorage.removeItem('token');
        location.href = '/index.html';
    }

    load();
</script>
</body>
</html>
