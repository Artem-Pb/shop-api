<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop — Orders</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; }
        nav { background: #4f46e5; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav span { color: white; font-size: 18px; font-weight: bold; }
        nav div a { color: white; text-decoration: none; margin-left: 1.5rem; font-size: 14px; }
        nav div a:hover { text-decoration: underline; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .order { background: white; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.25rem; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .order-header h3 { font-size: 15px; color: #111; }
        .order-header span { font-size: 13px; color: #6b7280; }
        .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 12px; font-weight: bold; }
        .PENDING   { background: #fef3c7; color: #92400e; }
        .CONFIRMED { background: #dbeafe; color: #1e40af; }
        .SHIPPED   { background: #e0e7ff; color: #3730a3; }
        .DELIVERED { background: #d1fae5; color: #065f46; }
        .CANCELLED { background: #fee2e2; color: #991b1b; }
        .items { border-top: 1px solid #f3f4f6; padding-top: 1rem; }
        .item-row { display: flex; justify-content: space-between; font-size: 14px; padding: 0.35rem 0; color: #374151; }
        .total { border-top: 1px solid #f3f4f6; margin-top: 0.75rem; padding-top: 0.75rem; display: flex; justify-content: flex-end; font-weight: bold; font-size: 16px; color: #4f46e5; }
        .empty { text-align: center; color: #9ca3af; padding: 3rem; }
    </style>
</head>
<body>
<nav>
    <span>Shop</span>
    <div>
        <a href="/products.html">Products</a>
        <a href="/cart.html">Cart</a>
        <a href="/orders.html">Orders</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="container">
    <div id="orders"></div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) location.href = '/index.html';

    async function load() {
        const res = await fetch('/api/orders', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.status === 401 || res.status === 403) { location.href = '/index.html'; return; }
        const orders = await res.json();
        const container = document.getElementById('orders');

        if (!orders.length) {
            container.innerHTML = '<div class="empty">No orders yet</div>';
            return;
        }

        container.innerHTML = orders.map(o => `
            <div class="order">
                <div class="order-header">
                    <h3>Order #${o.id} &nbsp; <span class="badge ${o.orderStatus}">${o.orderStatus}</span></h3>
                    <span>${new Date(o.createdAt).toLocaleString()}</span>
                </div>
                <div class="items">
                    ${o.items.map(i => `
                        <div class="item-row">
                            <span>${i.productName} × ${i.quantity}</span>
                            <span>$${(i.priceAtPurchase * i.quantity).toFixed(2)}</span>
                        </div>
                    `).join('')}
                    <div class="total">Total: $${o.totalAmount}</div>
                </div>
            </div>
        `).join('');
    }

    function logout() {
        localStorage.removeItem('token');
        location.href = '/index.html';
    }

    load();
</script>
</body>
</html>
