<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 2rem; border-radius: 10px; width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 1.5rem; text-align: center; color: #333; }
        input { width: 100%; padding: 0.7rem 1rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        button { width: 100%; padding: 0.75rem; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
        .btn-primary { background: #4f46e5; color: white; margin-bottom: 0.75rem; }
        .btn-secondary { background: #e5e7eb; color: #333; }
        .btn-primary:hover { background: #4338ca; }
        .error { color: red; font-size: 13px; margin-bottom: 1rem; display: none; }
    </style>
</head>
<body>
<div class="card">
    <h2>Shop</h2>
    <div id="error" class="error"></div>
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <button class="btn-primary" onclick="login()">Login</button>
    <button class="btn-secondary" onclick="register()">Register</button>
</div>

<script>
    if (localStorage.getItem('token')) location.href = '/products.html';

    async function login() {
        await auth('/api/auth/login');
    }

    async function register() {
        await auth('/api/auth/register');
    }

    async function auth(url) {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const err = document.getElementById('error');
        err.style.display = 'none';

        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('token', data.token);
            location.href = '/products.html';
        } else {
            err.style.display = 'block';
            err.textContent = data.error || 'Something went wrong';
        }
    }
</script>
</body>
</html>
